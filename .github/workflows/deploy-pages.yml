name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install audio tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python3 -m pip install --user edge-tts==7.2.8
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Edge TTS audio
        uses: actions/cache@v4
        with:
          path: learning/audio-cache
          key: edge-tts-${{ runner.os }}-${{ hashFiles('learning/days/**/article.md', 'scripts/study/speech-config.ts', 'scripts/study/generate-boundary-audio.py') }}
          restore-keys: |
            edge-tts-${{ runner.os }}-

      - name: Build static site
        run: pnpm pages:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
